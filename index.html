<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팔영산 무박산행 실시간 좌석선택</title>
    <style>
        :root { --main-color: #ff69b4; --main-dark: #e0559a; --bg-color: #f8f9fa; --seat-empty: #ffffff; --seat-booked: #ffe4f2; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; color: var(--main-color); font-size: 24px; }
        .bus-container { background: #fff; padding: 40px 25px 30px 25px; border-radius: 50px 50px 25px 25px; border: 5px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 290px; }
        .bus-front { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; color: #555; }
        .row { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .seat-group-left { display: flex; gap: 10px; }
        .aisle { width: 35px; text-align: center; color: #ccc; font-size: 10px; }
        .seat { width: 55px; height: 55px; background-color: var(--seat-empty); border: 2px solid #dee2e6; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; transition: all 0.2s; text-align: center; box-sizing: border-box; }
        .seat:hover { transform: translateY(-2px); border-color: var(--main-color); }
        .seat.occupied { background-color: var(--seat-booked); border-color: var(--main-color); color: #333; font-weight: bold; }
        .back-row { display: flex; justify-content: space-between; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px; }
        .info-box { margin-top: 30px; width: 320px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 14px; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: var(--main-dark); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 100; font-weight: bold; color: var(--main-color); }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">데이터 처리 중...</div>

<div class="header">
    <h1>⛰️ 고흥 팔영산 좌석선택</h1>
    <p>우등 28인승(한걸음산악회)</p>
</div>

<div class="bus-container">
    <div class="bus-front"><span>🛞 운전석</span> <span>🚪 입구</span></div>
    <div id="bus-layout"></div>
    <div class="back-row" id="back-row"></div>
</div>

<div class="info-box">
    <div class="status-bar"><span>현재 예약 현황</span> <span id="count-info">불러오는 중...</span></div>
    <div style="color: #666; font-size: 12px;">* 좌석 클릭 시 예약/수정/취소가 가능합니다.</div>
</div>

<script>
    // ⚠️ 중요: STEP 1에서 만든 구글 웹 앱 URL을 아래에 넣으세요.
const API_URL = "https://script.google.com/macros/s/AKfycbwAUCaouekfnLLYgLngYatueFWTP4sC6kUmjJhkanH_XJoYheqt6U7FOeH_CZqYT2CK/exec"; 

    const busLayout = document.getElementById('bus-layout');
    const backRow = document.getElementById('back-row');
    const countInfo = document.getElementById('count-info');
    const loading = document.getElementById('loading');
    
    let reservations = {};

    // 서버에서 데이터 불러오기
    async function loadData() {
        loading.style.display = 'flex';
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            reservations = data;
            renderBus();
        } catch (e) {
            console.error("데이터 로드 실패", e);
            alert("데이터를 불러오지 못했습니다.");
        }
        loading.style.display = 'none';
    }

    // 서버에 데이터 저장하기
    async function saveData() {
        loading.style.display = 'flex';
        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(reservations)
            });
        } catch (e) {
            alert("저장에 실패했습니다.");
        }
        loading.style.display = 'none';
    }

    function renderBus() {
        busLayout.innerHTML = '';
        backRow.innerHTML = '';
        for (let i = 0; i < 8; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            const leftGroup = document.createElement('div');
            leftGroup.className = 'seat-group-left';
            leftGroup.appendChild(createSeat(i * 3 + 1));
            leftGroup.appendChild(createSeat(i * 3 + 2));
            row.appendChild(leftGroup);
            const aisle = document.createElement('div');
            aisle.className = 'aisle'; aisle.innerText = '···';
            row.appendChild(aisle);
            row.appendChild(createSeat(i * 3 + 3));
            busLayout.appendChild(row);
        }
        for (let i = 25; i <= 28; i++) {
            backRow.appendChild(createSeat(i));
        }
        countInfo.innerText = `${Object.keys(reservations).length} / 28 명`;
    }

    function createSeat(num) {
        const seat = document.createElement('div');
        seat.className = 'seat' + (reservations[num] ? ' occupied' : '');
        seat.innerText = reservations[num] || num;
        seat.onclick = async () => {
            const name = prompt(`${num}번 좌석 성함 (비우면 취소):`, reservations[num] || "");
            if (name === null) return;
            if (name.trim() === "") delete reservations[num];
            else reservations[num] = name.trim();
            renderBus();
            await saveData();
        };
        return seat;
    }

    // 시작 시 데이터 로드
    loadData();
</script>
</body>
</html>
